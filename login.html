<html>
    <head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
          background-image: url('https://www.desktopbackground.org/p/2015/08/01/988363_other-wallpaper-school-chalkboard-desktop-wallpapers-for-hd_1707x1125_h.jpg');
          background-repeat: no-repeat;
          background-attachment: fixed;
          background-size: cover;
        }
        .signupform {
            width: 800px;
            height: 450px;
            background-color: white;
            position: absolute;
            top: 170px;
            right: 400px;
            border-radius: 10px;
            font-family: 'Cairo';
            font-size: 20px;
            display: flex;
            text-align: left;
            opacity: 0.9;
        }
        form {
            position: relative;
            top: 5px;
            left: 250px;
        }
        form input{
            width: 300px;
            height: 40px;
            font-size: 20px;
            display: flex;
            margin-bottom: 30px;
            position: relative;
            right: 100px;
            font-family: 'Cairo';
            text-align: center;
            border-radius: 3px;
            border: 1px solid grey;
        }
        input[type="button"] {
            width: 200px;
            height: 50px;
            text-align: center;
            position: absolute;
            top: 230px;
            right: 320px;
            background-color: rgb(189, 189, 189);
            color: black;
            transition: 0.3s;
    
        }
        input[type="button"]:hover {
            background-color: #005547;
            color: white;
             

        }
        form label {
            display: flex;
            text-align: center;
            margin-top: 10px;
            margin-left: 350px;
            position: relative;
            right: 50px;
            top: 35px;
            font-size: 20px;
        }

        .header {
    text-align: center;
    color: rgb(255, 255, 255);
    font-family: 'Cairo';
    font-size: 100px;
    position: absolute;
    left: 1px;
    text-shadow: 2px 3px rgb(12, 56, 29);
}
.para {
    position: relative ;
    top: 270px;
    right: 280px;
}
.para a {
  text-decoration: underline;
  color: #005547;
}

        </style>
    <title> تسجيل الدخول </title>
    <link rel="icon" type="image/x-icon" href="favicon.ico.ico">

  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
    </head>
    <body>
        <h1 class="header">نِتْعَلْمُوا </h1>  

        <div class="signupform">
            <form>
                <label>البريد الالكتروني</label>
                <input type="email" placeholder="">
                <label>كلمة المرور</label>
                <input type="password" placeholder="">
                <input type="button" value="الدخول">
            

            </form>
            <p class="para">ليس لديك حساب ؟ <a href="signup.html">ادخل هنا </a>
        </div>
    </body>
   </html>
